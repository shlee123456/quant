services:
  trading-bot:
    build:
      context: .
      dockerfile: Dockerfile
    image: trading-bot:latest
    container_name: trading-bot

    # Restart policy
    restart: unless-stopped

    # Port mapping
    ports:
      - "8501:8501"  # Streamlit dashboard

    # Volume mounts
    volumes:
      # Data persistence
      - ./data:/app/data
      # Log persistence
      - ./logs:/app/logs
      # Configuration files (optional)
      - ./config:/app/config:ro
      # Environment variables (read-only for security)
      - ./.env:/app/.env:ro

    # Environment variables from .env file
    env_file:
      - .env

    # Additional environment variables
    environment:
      - PYTHONUNBUFFERED=1
      - STREAMLIT_SERVER_PORT=8501
      - STREAMLIT_SERVER_ADDRESS=0.0.0.0
      - STREAMLIT_BROWSER_GATHER_USAGE_STATS=false

    # Resource limits (optional, uncomment if needed)
    # deploy:
    #   resources:
    #     limits:
    #       cpus: '2.0'
    #       memory: 2G
    #     reservations:
    #       cpus: '0.5'
    #       memory: 512M

    # Health check
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

    # Logging configuration
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

# Optional: Named volumes for data persistence
# volumes:
#   data:
#   logs:
