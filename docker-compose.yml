services:
  trading-bot-dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    image: trading-bot:latest
    container_name: trading-bot-dashboard

    # Restart policy
    restart: unless-stopped

    # Port mapping
    ports:
      - "8501:8501"  # Streamlit dashboard

    # Volume mounts
    volumes:
      # Data persistence
      - ./data:/app/data
      # Log persistence
      - ./logs:/app/logs
      # Reports persistence
      - ./reports:/app/reports
      # Configuration files (optional)
      - ./config:/app/config:ro
      # Environment variables (read-only for security)
      - ./.env:/app/.env:ro

    # Environment variables from .env file
    env_file:
      - .env

    # Additional environment variables
    environment:
      - PYTHONUNBUFFERED=1
      - STREAMLIT_SERVER_PORT=8501
      - STREAMLIT_SERVER_ADDRESS=0.0.0.0
      - STREAMLIT_BROWSER_GATHER_USAGE_STATS=false

    # Resource limits (optional, uncomment if needed)
    # deploy:
    #   resources:
    #     limits:
    #       cpus: '2.0'
    #       memory: 2G
    #     reservations:
    #       cpus: '0.5'
    #       memory: 512M

    # Health check
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

    # Logging configuration
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  trading-bot-scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    image: trading-bot:latest
    container_name: trading-bot-scheduler

    # Restart policy
    restart: unless-stopped

    # Override default command to run scheduler (전체 프리셋 5개)
    command: >
      python scheduler.py
      --presets
      "Top10 US - RSI 평균회귀"
      "Top10 US - MACD 추세추종"
      "Top10 US - 볼린저밴드 변동성"
      "Top10 US - 듀얼 A조 빅테크"
      "Top10 US - 듀얼 B조 다각화"

    # Volume mounts (same as dashboard for data sharing)
    volumes:
      # Data persistence (shared with dashboard)
      - ./data:/app/data
      # Log persistence
      - ./logs:/app/logs
      # Reports persistence
      - ./reports:/app/reports
      # Configuration files (optional)
      - ./config:/app/config:ro
      # Environment variables (read-only for security)
      - ./.env:/app/.env:ro

    # Environment variables from .env file
    env_file:
      - .env

    # Additional environment variables
    environment:
      - PYTHONUNBUFFERED=1
      - TZ=Asia/Seoul  # Set timezone for scheduler

    # Disable Dockerfile's Streamlit healthcheck (not applicable for scheduler)
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'scheduler.py' || exit 1"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s

    # Resource limits (optional, uncomment if needed)
    # deploy:
    #   resources:
    #     limits:
    #       cpus: '1.0'
    #       memory: 1G
    #     reservations:
    #       cpus: '0.25'
    #       memory: 256M

    # Logging configuration
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

# Optional: Named volumes for data persistence
# volumes:
#   data:
#   logs:
